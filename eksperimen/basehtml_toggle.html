<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}My App{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- CDN i-->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

</head>
<body>
 <!-- HEADER BAR -->
<div class="header d-flex justify-content-between align-items-center bg-white border-bottom px-3 py-1">
  <!-- Logo -->
  <div class="d-flex align-items-center">
    <img src="{{ url_for('static', filename='img/logo.png') }}" height="50" class="me-2" alt="Logo">
  </div>

  <!-- TENGAH: Tombol dan Input -->
 
    <div class="mb-1 compact-buttons">
      <button class="btn btn-success btn-sm py-1">New</button>
      <button class="btn btn-primary btn-sm py-1">Load</button>
    </div>
    <div>
        <p class="d-flex mt-3" >Curent Analysis</p>
    </div>
    <div class="d-flex row compact-input">
      <div class="me-3 small text-muted">
        <span>Analysis Name :</span>
        <input type="text" class="form-control form-control-sm d-inline-block w-auto" value="Financials">
      </div>
      <div class="small text-muted">
        <span>Analyst Name :</span>
        <input type="text" class="form-control form-control-sm d-inline-block w-auto" value="Project">
      </div>
    </div>
  

  <!-- KANAN: Icon Group -->
  <div class="icon-group d-flex align-items-center gap-4 text-secondary">
    <i class="fas fa-phone" style="font-size: 15px;"></i>
    <i class="fas fa-question-circle" style="font-size: 15px;"></i>
    <i class="fas fa-sign-out-alt" style="font-size: 15px;"></i>
    <i class="fas fa-globe" style="font-size: 15px;"></i>
    <i class="fas fa-user-circle" style="font-size: 15px;"></i>
  </div>
</div>


  <!-- BODY WRAPPER -->
  <div class="d-flex">
    <!-- SIDEBAR -->
    <button id="toggleSidebar" class="btn btn-sm btn-none pl-3"><i class="fas fa-arrow-left"></i>Hide Menu</button>
    <div class="sidebar bg-light" id="sidebar">
        <ul class="nav flex-column text-center mb-5">
            <li class="nav-item">
                <a class="nav-link" href="#">
                <div class="nav-icon-text">
                    <i class="fas fa-home" style="font-size: 15px;"></i>
                    <span>Dashboard</span>
                </div>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">
                <div class="nav-icon-text">
                    <i class="fas fa-building" style="font-size: 15px;"></i>
                    <span>Comparable Company Search</span>
                </div>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">
                <div class="nav-icon-text">
                    <i class="fas fa-briefcase" style="font-size: 15px;"></i>
                    <span>Credit Rating Tool</span>
                </div>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" href="#">
                <div class="nav-icon-text">
                    <i class="fas fa-file-contract" style="font-size: 15px;"></i>
                    <span>Loan Agreement Search</span>
                </div>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">
                <div class="nav-icon-text">
                    <i class="fas fa-cogs" style="font-size: 15px;"></i>
                    <span>Comparable Service Search</span>
                </div>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">
                <div class="nav-icon-text">
                    <i class="fas fa-money-bill-wave" style="font-size: 15px;"></i>
                    <span>Royalti Search</span>
                </div>
                </a>
            </li>
            </ul>
        </div>



    <!-- KONTEN UTAMA -->
    <div class="main-content flex-grow-1 p-4" id="main-content">
      {% block content %}
      <h1>Konten halaman</h1>
      {% endblock %}
    </div>
  </div>


  <script>
    // JS toggle sidebar
    document.getElementById("toggleSidebar").addEventListener("click", function () {
  const sidebar = document.getElementById("sidebar");
  const content = document.getElementById("main-content");
  
  sidebar.classList.toggle("d-none");

  if (sidebar.classList.contains("d-none")) {
    content.classList.add("w-100");
    this.innerHTML = '<i class="fas fa-bars"></i>'; // icon menu saat sidebar disembunyi
  } else {
    content.classList.remove("w-100");
    this.innerHTML = '<i class="fas fa-arrow-left"></i> Hide Menu'; // icon & text saat sidebar tampil
  }
});

  </script>
</body>
</html>
